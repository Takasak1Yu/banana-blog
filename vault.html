    <link rel="stylesheet" href="assets/style.css">
    <style>
        .vault-page {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 60px;
            width: 100%;
        }

        @media (min-width: 740px) {
            .vault-page {
                padding: 48px 24px 80px;
            }
        }

        .vault-title {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.015em;
            line-height: 1.15;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        @media (min-width: 740px) {
            .vault-title {
                font-size: 40px;
            }
        }

        .vault-subtitle {
            font-size: 17px;
            color: var(--color-text-secondary);
            margin-bottom: 40px;
        }

        .vault-lock-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            text-align: center;
            padding: 40px 20px;
        }

        .vault-lock-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent), var(--color-accent-hover));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 113, 227, 0.25);
        }

        .vault-lock-icon svg {
            width: 36px;
            height: 36px;
            color: #ffffff;
        }

        .vault-lock-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .vault-lock-desc {
            font-size: 15px;
            color: var(--color-text-secondary);
            margin-bottom: 28px;
            max-width: 320px;
            line-height: 1.5;
        }

        .vault-password-form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }

        .vault-password-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            background-color: var(--color-bg-secondary);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            font-size: 17px;
            outline: none;
            text-align: center;
            letter-spacing: 0.1em;
            transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
        }

        .vault-password-input:focus {
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        .vault-password-input::placeholder {
            letter-spacing: normal;
            color: var(--color-text-tertiary);
        }

        .vault-password-input.error {
            border-color: #ff3b30;
            box-shadow: 0 0 0 3px rgba(255, 59, 48, 0.15);
            animation: vaultShake 0.4s ease;
        }

        @keyframes vaultShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .vault-error-msg {
            font-size: 13px;
            color: #ff3b30;
            min-height: 18px;
        }

        .vault-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 20px;
            border: none;
            border-radius: 100px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color var(--transition-fast), transform var(--transition-fast);
            text-decoration: none;
        }

        .vault-btn:active {
            transform: scale(0.97);
        }

        .vault-btn svg {
            width: 16px;
            height: 16px;
        }

        .vault-btn-primary {
            background-color: var(--color-accent);
            color: #ffffff;
        }

        .vault-btn-primary:hover {
            background-color: var(--color-accent-hover);
            color: #ffffff;
        }

        .vault-btn-secondary {
            background-color: var(--color-tag-bg);
            color: var(--color-text-primary);
        }

        .vault-btn-secondary:hover {
            background-color: var(--color-border);
            color: var(--color-text-primary);
        }

        .vault-btn-danger {
            background-color: #ff3b30;
            color: #ffffff;
        }

        .vault-btn-danger:hover {
            background-color: #ff5147;
            color: #ffffff;
        }

        .vault-btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .vault-gallery {
            display: none;
        }

        .vault-gallery.active {
            display: block;
        }

        .vault-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 0.5px solid var(--color-border);
        }

        .vault-toolbar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vault-toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vault-photo-count {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        @media (min-width: 740px) {
            .vault-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
        }

        .vault-photo-card {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            background-color: var(--color-bg-secondary);
            aspect-ratio: 1;
            cursor: pointer;
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
        }

        .vault-photo-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-card-hover);
        }

        .vault-photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .vault-photo-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity var(--transition-fast), background-color var(--transition-fast);
        }

        .vault-photo-card:hover .vault-photo-delete {
            opacity: 1;
        }

        .vault-photo-delete:hover {
            background-color: #ff3b30;
        }

        .vault-photo-delete svg {
            width: 14px;
            height: 14px;
        }

        .vault-photo-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 10px 8px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
            color: #ffffff;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .vault-photo-card:hover .vault-photo-name {
            opacity: 1;
        }

        .vault-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-tertiary);
        }

        .vault-empty svg {
            width: 48px;
            height: 48px;
            color: var(--color-border);
            margin-bottom: 16px;
        }

        .vault-empty-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }

        .vault-empty-desc {
            font-size: 14px;
            line-height: 1.5;
        }

        .vault-lightbox {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.92);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .vault-lightbox.active {
            display: flex;
        }

        .vault-lightbox-img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: var(--radius-md);
            box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
        }

        .vault-lightbox-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: none;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-fast);
        }

        .vault-lightbox-close:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .vault-lightbox-close svg {
            width: 20px;
            height: 20px;
        }

        .vault-lightbox-name {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .vault-confirm-overlay {
            position: fixed;
            inset: 0;
            background-color: var(--color-overlay);
            z-index: 600;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .vault-confirm-overlay.active {
            display: flex;
        }

        .vault-confirm-dialog {
            width: 100%;
            max-width: 360px;
            background-color: var(--color-card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card-hover);
            padding: 24px;
            text-align: center;
        }

        .vault-confirm-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .vault-confirm-message {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .vault-confirm-actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .vault-toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background-color: var(--color-text-primary);
            color: var(--color-bg);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            z-index: 700;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
        }

        .vault-toast.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .vault-upload-area {
            border: 2px dashed var(--color-border);
            border-radius: var(--radius-lg);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition-fast), background-color var(--transition-fast);
            margin-bottom: 24px;
        }

        .vault-upload-area:hover {
            border-color: var(--color-accent);
            background-color: rgba(0, 113, 227, 0.04);
        }

        .vault-upload-area svg {
            width: 36px;
            height: 36px;
            color: var(--color-text-tertiary);
            margin-bottom: 12px;
        }

        .vault-upload-area-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }

        .vault-upload-area-desc {
            font-size: 13px;
            color: var(--color-text-tertiary);
        }

        .vault-section-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.015em;
            color: var(--color-text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vault-section-title svg {
            width: 20px;
            height: 20px;
            color: var(--color-accent);
        }

        .vault-divider {
            height: 0.5px;
            background-color: var(--color-border);
            margin: 24px 0;
        }

        .vault-upload-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
    </style>
</head>

                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

                            </button>

                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>

                <input type="text" class="search-modal-input" placeholder="搜索文章..." aria-label="搜索">
                <button class="search-modal-close" aria-label="关闭搜索">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>

    <div class="vault-lightbox" id="vault-lightbox">
        <button class="vault-lightbox-close" id="lightbox-close" aria-label="关闭">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <img class="vault-lightbox-img" id="lightbox-img" src="" alt="">
        <div class="vault-lightbox-name" id="lightbox-name"></div>

    <div class="vault-confirm-overlay" id="vault-confirm-overlay">
        <div class="vault-confirm-dialog">
            <div class="vault-confirm-title" id="vault-confirm-title">删除所有照片？</div>
            <div class="vault-confirm-message" id="vault-confirm-message">此操作无法撤销。</div>
            <div class="vault-confirm-actions">
                <button class="vault-btn vault-btn-secondary vault-btn-sm" id="vault-confirm-cancel">取消</button>
                <button class="vault-btn vault-btn-danger vault-btn-sm" id="vault-confirm-ok">全部删除</button>
            </div>
        </div>
    </div>

    <div class="vault-toast" id="vault-toast"></div>

    <input type="file" id="photo-file-input" accept="image/*" multiple style="display:none;">
    <input type="file" id="package-file-input" accept=".json" style="display:none;">

    <script src="assets/data.js"></script>
    <script src="assets/app.js"></script>
    <script>
    (function() {
        var STORAGE_PASSWORD = 'vault-password-hash';
        var STORAGE_PHOTOS = 'vault-photos';
        var currentPassword = null;
        var confirmCallback = null;

        function $(sel) { return document.querySelector(sel); }
        function $$(sel) { return document.querySelectorAll(sel); }

        function simpleHash(str) {
            var hash = 5381;
            for (var i = 0; i < str.length; i++) {
                hash = ((hash << 5) + hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return hash.toString(16);
        }

        function encrypt(data, key) {
            var result = '';
            for (var i = 0; i < data.length; i++) {
                var charCode = data.charCodeAt(i) ^ key.charCodeAt(i % key.length);
                result += String.fromCharCode(charCode);
            }
            return btoa(result);
        }

        function decrypt(data, key) {
            var decoded = atob(data);
            var result = '';
            for (var i = 0; i < decoded.length; i++) {
                var charCode = decoded.charCodeAt(i) ^ key.charCodeAt(i % key.length);
                result += String.fromCharCode(charCode);
            }
            return result;
        }

        function hasPassword() {
            return !!localStorage.getItem(STORAGE_PASSWORD);
        }

        function showToast(message) {
            var toast = $('#vault-toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(function() {
                toast.classList.remove('visible');
            }, 2500);
        }

        function showConfirm(title, message, onConfirm) {
            $('#vault-confirm-title').textContent = title;
            $('#vault-confirm-message').textContent = message;
            confirmCallback = onConfirm;
            $('#vault-confirm-overlay').classList.add('active');
        }

        function hideConfirm() {
            $('#vault-confirm-overlay').classList.remove('active');
            confirmCallback = null;
        }

        function showLockScreen() {
            var isSetup = !hasPassword();
            $('#vault-lock-screen').style.display = 'flex';
            $('#vault-gallery').classList.remove('active');

            if (isSetup) {
                $('#vault-lock-title').textContent = '设置密码';
                $('#vault-lock-desc').textContent = '创建密码以保护你的相册。此密码无法恢复。';
                $('#vault-password-confirm').style.display = 'block';
                $('#vault-submit-text').textContent = '创建相册';
                $('#vault-password-input').placeholder = '输入密码';
            } else {
                $('#vault-lock-title').textContent = '相册已锁定';
                $('#vault-lock-desc').textContent = '输入密码解锁相册。';
                $('#vault-password-confirm').style.display = 'none';
                $('#vault-submit-text').textContent = '解锁';
                $('#vault-password-input').placeholder = '输入密码解锁';
            }

            $('#vault-password-input').value = '';
            $('#vault-password-confirm').value = '';
            $('#vault-error-msg').textContent = '';
            $('#vault-password-input').classList.remove('error');
            $('#vault-password-confirm').classList.remove('error');
        }

        function showGallery() {
            $('#vault-lock-screen').style.display = 'none';
            $('#vault-gallery').classList.add('active');
            renderGallery();
        }

        function handleSubmit() {
            var password = $('#vault-password-input').value;
            var isSetup = !hasPassword();

            if (isSetup) {
                var confirm = $('#vault-password-confirm').value;
                if (!password) {
                    $('#vault-error-msg').textContent = '密码不能为空。';
                    $('#vault-password-input').classList.add('error');
                    return;
                }
                if (password.length < 4) {
                    $('#vault-error-msg').textContent = '密码至少需要4个字符。';
                    $('#vault-password-input').classList.add('error');
                    return;
                }
                if (password !== confirm) {
                    $('#vault-error-msg').textContent = '密码不一致。';
                    $('#vault-password-confirm').classList.add('error');
                    return;
                }
                localStorage.setItem(STORAGE_PASSWORD, simpleHash(password));
                currentPassword = password;
                showToast('相册创建成功');
                showGallery();
            } else {
                if (!password) {
                    $('#vault-error-msg').textContent = '请输入密码。';
                    $('#vault-password-input').classList.add('error');
                    return;
                }
                if (simpleHash(password) !== localStorage.getItem(STORAGE_PASSWORD)) {
                    $('#vault-error-msg').textContent = '密码错误。';
                    $('#vault-password-input').classList.add('error');
                    $('#vault-password-input').value = '';
                    return;
                }
                currentPassword = password;
                showToast('相册已解锁');
                showGallery();
            }
        }

        function getPhotos() {
            try {
                var raw = localStorage.getItem(STORAGE_PHOTOS);
                if (!raw) return [];
                var encrypted = JSON.parse(raw);
                var decrypted = decrypt(encrypted, currentPassword);
                return JSON.parse(decrypted);
            } catch (e) {
                return [];
            }
        }

        function savePhotos(photos) {
            var json = JSON.stringify(photos);
            var encrypted = encrypt(json, currentPassword);
            localStorage.setItem(STORAGE_PHOTOS, JSON.stringify(encrypted));
        }

        function renderGallery() {
            var photos = getPhotos();
            var grid = $('#vault-photo-grid');
            var emptyState = $('#vault-empty-state');
            var countEl = $('#vault-photo-count');

            countEl.textContent = photos.length + ' 张照片';

            if (photos.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            grid.innerHTML = photos.map(function(photo, index) {
                return '<div class="vault-photo-card" data-index="' + index + '">' +
                    '<img src="' + photo.data + '" alt="' + (photo.name || '照片') + '" loading="lazy">' +
                    '<button class="vault-photo-delete" data-index="' + index + '" aria-label="删除照片">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
                    '</button>' +
                    '<div class="vault-photo-name">' + (photo.name || '照片') + '</div>' +
                    '</div>';
            }).join('');
        }

        function uploadPhotos(files) {
            if (!currentPassword) return;
            var photos = getPhotos();
            var processed = 0;
            var total = files.length;

            Array.from(files).forEach(function(file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var base64 = e.target.result;
                    photos.push({
                        data: base64,
                        name: file.name,
                        date: new Date().toISOString()
                    });
                    processed++;
                    if (processed === total) {
                        savePhotos(photos);
                        renderGallery();
                        showToast('照片已上传');
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function importPackage(file) {
            if (!currentPassword) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var pkg = JSON.parse(e.target.result);
                    if (!pkg.photos || !Array.isArray(pkg.photos)) {
                        showToast('无效的加密包格式');
                        return;
                    }
                    var photos = getPhotos();
                    var imported = 0;
                    pkg.photos.forEach(function(item) {
                        if (item.data && item.name) {
                            photos.push({
                                data: item.data,
                                name: item.name,
                                date: item.date || new Date().toISOString()
                            });
                            imported++;
                        }
                    });
                    savePhotos(photos);
                    renderGallery();
                    showToast('加密包已导入');
                } catch (err) {
                    showToast('导入加密包失败');
                }
            };
            reader.readAsText(file);
        }

        function deletePhoto(index) {
            var photos = getPhotos();
            if (index >= 0 && index < photos.length) {
                photos.splice(index, 1);
                savePhotos(photos);
                renderGallery();
                showToast('照片已删除');
            }
        }

        function deleteAllPhotos() {
            showConfirm(
                '删除所有照片？',
                '此操作无法撤销。',
                function() {
                    savePhotos([]);
                    renderGallery();
                    showToast('所有照片已删除');
                }
            );
        }

        function exportPackage() {
            if (!currentPassword) return;
            var photos = getPhotos();
            if (photos.length === 0) {
                showToast('没有照片可导出');
                return;
            }
            var pkg = {
                photos: photos.map(function(p) {
                    return {
                        data: p.data,
                        name: p.name,
                        date: p.date
                    };
                })
            };
            var json = JSON.stringify(pkg, null, 2);
            var blob = new Blob([json], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'vault-export-' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('加密包已导出');
        }

        function lockVault() {
            currentPassword = null;
            showLockScreen();
            showToast('相册已锁定');
        }

        function openLightbox(index) {
            var photos = getPhotos();
            if (index < 0 || index >= photos.length) return;
            var photo = photos[index];
            $('#lightbox-img').src = photo.data;
            $('#lightbox-img').alt = photo.name || '照片';
            $('#lightbox-name').textContent = photo.name || '';
            $('#vault-lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            $('#vault-lightbox').classList.remove('active');
            document.body.style.overflow = '';
            $('#lightbox-img').src = '';
        }

        function init() {
            showLockScreen();

            $('#vault-submit-btn').addEventListener('click', function(e) {
                e.preventDefault();
                handleSubmit();
            });

            $('#vault-password-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (!hasPassword() && $('#vault-password-confirm').style.display !== 'none') {
                        $('#vault-password-confirm').focus();
                    } else {
                        handleSubmit();
                    }
                }
            });

            $('#vault-password-input').addEventListener('input', function() {
                this.classList.remove('error');
                $('#vault-error-msg').textContent = '';
            });

            $('#vault-password-confirm').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSubmit();
                }
            });

            $('#vault-password-confirm').addEventListener('input', function() {
                this.classList.remove('error');
                $('#vault-error-msg').textContent = '';
            });

            $('#btn-upload-photos').addEventListener('click', function() {
                $('#photo-file-input').click();
            });

            $('#photo-file-input').addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    uploadPhotos(e.target.files);
                    e.target.value = '';
                }
            });

            $('#btn-import-package').addEventListener('click', function() {
                $('#package-file-input').click();
            });

            $('#package-file-input').addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    importPackage(e.target.files[0]);
                    e.target.value = '';
                }
            });

            $('#btn-export').addEventListener('click', exportPackage);
            $('#btn-delete-all').addEventListener('click', deleteAllPhotos);
            $('#btn-lock').addEventListener('click', lockVault);

            $('#vault-photo-grid').addEventListener('click', function(e) {
                var deleteBtn = e.target.closest('.vault-photo-delete');
                if (deleteBtn) {
                    e.stopPropagation();
                    deletePhoto(parseInt(deleteBtn.dataset.index, 10));
                    return;
                }
                var card = e.target.closest('.vault-photo-card');
                if (card) {
                    openLightbox(parseInt(card.dataset.index, 10));
                }
            });

            $('#lightbox-close').addEventListener('click', closeLightbox);

            $('#vault-lightbox').addEventListener('click', function(e) {
                if (e.target === this) closeLightbox();
            });

            $('#vault-confirm-cancel').addEventListener('click', hideConfirm);
            $('#vault-confirm-ok').addEventListener('click', function() {
                if (confirmCallback) confirmCallback();
                hideConfirm();
            });

            $('#vault-confirm-overlay').addEventListener('click', function(e) {
                if (e.target === this) hideConfirm();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    if ($('#vault-confirm-overlay').classList.contains('active')) {
                        hideConfirm();
                    } else if ($('#vault-lightbox').classList.contains('active')) {
                        closeLightbox();
                    }
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
